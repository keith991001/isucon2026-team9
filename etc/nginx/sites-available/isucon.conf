# Go アプリへの接続を keepalive で使い回す
upstream app {
  server 127.0.0.1:8080;
  keepalive 256;
}

server {
  listen 80 default_server;

  client_max_body_size 10m;
  client_body_buffer_size 16m;
  root /home/isucon/private_isu/webapp/public/;

  # 静的ファイル（テンプレートの css/js/img・favicon）は Nginx が直接返す。
  location ~ ^/(css|js|img)/ {
    expires 1d;
    try_files $uri =404;
  }

  location = /favicon.ico {
    expires 1d;
    try_files $uri =404;
  }

  # 投稿画像：ファイルがあれば Nginx が直接返す。無ければ Ruby/Go にフォールバック。
  location ~ ^/image/.+\.(jpg|jpeg|png|gif)$ {
    expires 1d;
    try_files $uri @app;
  }

  location @app {
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_pass http://app;
  }

  location / {
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_pass http://app;
  }
}
